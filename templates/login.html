<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 - 도미노피자 재고·발주</title>
  <style>
    :root {
      --dominos-red: #E31837;
      --dominos-blue: #006491;
      --dominos-red-dark: #c41430;
      --bg: #f5f5f5;
      --card: #ffffff;
      --border: #e0e0e0;
      --text: #1a1a1a;
      --muted: #666666;
      --error: #c62828;
    }
    * { box-sizing: border-box; }
    body {
      font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 36px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }
    .logo {
      text-align: center;
      margin-bottom: 8px;
      font-size: 1.5rem;
    }
    h1 { font-size: 1.25rem; margin: 0 0 8px 0; color: var(--dominos-red); font-weight: 800; text-align: center; }
    .sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 24px; text-align: center; }
    label { display: block; margin-bottom: 6px; color: var(--muted); font-size: 0.9rem; }
    input[type="password"] {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      font-size: 1rem;
      margin-bottom: 16px;
    }
    input[type="password"]:focus {
      outline: none;
      border-color: var(--dominos-red);
      box-shadow: 0 0 0 2px rgba(227, 24, 55, 0.15);
    }
    button {
      width: 100%;
      padding: 14px;
      background: var(--dominos-red);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
    }
    button:hover { background: var(--dominos-red-dark); }
    .error { color: var(--error); font-size: 0.9rem; margin-bottom: 12px; text-align: center; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🍕</div>
    <h1>도미노피자 재고·발주</h1>
    <p class="sub">팀 비밀번호를 입력하세요.</p>
    {% if error %}
    <p class="error">{{ error }}</p>
    {% endif %}
    <form method="post" action="{{ url_for('login') }}">
      <label for="password">비밀번호</label>
      <input type="password" id="password" name="password" required autofocus placeholder="비밀번호 입력">
      <button type="submit">로그인</button>
    </form>
  </div>
</body>
</html>
